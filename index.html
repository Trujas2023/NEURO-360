<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Bitácora</title>
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js');
      }
    </script>
</head>
<body>
    <div id="historial">
        <h2>Historial de hoy</h2>
        <ul id="listaRegistros"></ul>
        <button id="btnLimpiar" style="background-color: #ff4757; color: white; width: 100%; padding: 10px; border: none;">
            Limpiar Historial
        </button>
    </div>

    <form id="registroForm">
        <fieldset>
            <legend>Salud y Bienestar</legend>
            <label>Fecha:</label>
            <input type="date" name="fecha" required>
            <label>Sueño (horas/calidad):</label>
            <input type="text" name="sueno">
            <label>Digestión:</label>
            <select name="digestion">
                <option value="Normal">Normal</option>
                <option value="Dura">Dura</option>
                <option value="Liquida">Líquida</option>
            </select>
        </fieldset>
        <!-- ... resto de tu formulario ... -->
    </form>

    <script src="app.js"></script>
</body>
</html>
